
services:

  postgres:
    image: postgres:16
    container_name: postgres_bienes
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234567A
      POSTGRES_DB: bienes_logistica
    ports:
      - "5433:5432"
    volumes:
      - pgdata_bienes:/var/lib/postgresql/data
    networks:
      - app_network

  redis:
    image: redis:7
    container_name: redis_bienes
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - app_network

  backend:
    build:
      context: ./DIDADPOL_BIENES_LOGISTICA_BACKEND
    container_name: backend_bienes
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: 1234567A
      DB_NAME: bienes_logistica
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres
      - redis
    networks:
      - app_network

  frontend:
    build:
      context: ./DIDADPOL_BIENES_LOGISTICA_FRONTEND
    container_name: frontend_bienes
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    container_name: nginx_bienes
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app_network

volumes:
  pgdata_bienes:

networks:
  app_network: